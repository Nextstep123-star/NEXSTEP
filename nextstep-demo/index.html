<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXTSTEP — เส้นทางของคุณ</title>

  <!-- Apply saved theme before paint (no flash). Default = dark. -->
  <script>try { if ((localStorage.getItem("nextstep_theme") || "dark") === "light") document.documentElement.classList.add("light"); } catch (e) {}</script>

  <!-- Fonts (from Stitch design system) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <!-- Tailwind + Stitch design tokens -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {
          // Dark theme (default) — spec §7: dark base + lime accent
          "background": "#16180f", "surface": "#16180f", "surface-bright": "#2c2f28",
          "surface-dim": "#101109", "surface-variant": "#3a3f34",
          "surface-container-lowest": "#1b1d16", "surface-container-low": "#1f2119",
          "surface-container": "#23251d", "surface-container-high": "#292c23",
          "surface-container-highest": "#34382f",
          "on-background": "#eef0e6", "on-surface": "#eef0e6", "on-surface-variant": "#9aa090",
          "primary": "#c2d90f", "on-primary": "#16180f",
          "primary-container": "#c2d90f", "on-primary-container": "#16180f",
          "primary-fixed": "#dcee5a", "primary-fixed-dim": "#96a80a",
          "secondary": "#d3cb00", "on-secondary": "#16180f",
          "secondary-container": "#4c4900", "secondary-fixed": "#f1e800",
          "on-secondary-fixed-variant": "#4c4900",
          "tertiary": "#88ceff", "tertiary-container": "#4abdff",
          "outline": "#8b937f", "outline-variant": "#454b3d",
          "error": "#ffb4ab", "error-container": "#93000a", "on-error": "#16180f",
        },
        borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        spacing: { xs: "4px", sm: "8px", md: "16px", lg: "24px", xl: "32px" },
        fontFamily: {
          "headline": ["Kanit", "sans-serif"], "display": ["Kanit", "sans-serif"],
          "body": ["IBM Plex Sans Thai", "IBM Plex Sans", "sans-serif"],
          "thai": ["IBM Plex Sans Thai", "sans-serif"],
          "mono": ["IBM Plex Mono", "monospace"],
        },
      }},
    };
  </script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-surface text-on-surface font-body">
  <!-- Splash (lime) → reveal NEX → fade into app. v1, no logic coupling. -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash-logo">
      <!-- nex-mark (inline SVG stand-in — swap for assets/nex-mark.png when available) -->
      <svg class="s-mark" viewBox="0 0 580 388" role="img" aria-label="NEX mark">
        <g fill="#16180f">
          <rect x="120" y="163" width="340" height="62" rx="31"/>
          <rect x="120" y="163" width="340" height="62" rx="31" transform="rotate(90 290 194)"/>
          <rect x="130" y="163" width="320" height="62" rx="31" transform="rotate(45 290 194)"/>
          <rect x="130" y="163" width="320" height="62" rx="31" transform="rotate(135 290 194)"/>
        </g>
      </svg>
      <!-- nex-wordmark (Kanit text stand-in) -->
      <svg class="s-word" viewBox="0 0 1083 395" role="img" aria-label="NEX">
        <text x="541" y="300" text-anchor="middle" textLength="980" lengthAdjust="spacingAndGlyphs"
              font-family="Kanit, sans-serif" font-weight="700" font-size="330" letter-spacing="6" fill="#16180f">NEX</text>
      </svg>
    </div>
    <p class="s-tag">เริ่มต้นเส้นทางสู่คณะในฝัน</p>
  </div>

  <!-- SPA root — app.js renders the active view here -->
  <div id="app"></div>

  <!-- Toast host -->
  <div id="toast"></div>

  <!-- Supabase JS v2 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/app.js"></script>

  <!-- Splash controller (independent of app logic): hold → fade → remove -->
  <script>
    (function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      window.addEventListener("load", function () {
        var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
        var hold = reduce ? 400 : 1900; // let the reveal play, then fade
        setTimeout(function () {
          splash.classList.add("done");
          var removed = false, rm = function () { if (removed) return; removed = true; splash.remove(); };
          splash.addEventListener("transitionend", rm, { once: true });
          setTimeout(rm, 900); // fallback if transitionend never fires
        }, hold);
      });
    })();
  </script>
</body>
</html>
